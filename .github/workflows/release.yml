name: "Publish release to PyPI and GitHub"

on:
  push:
    tags:
      # Publish on any tag starting with a `v`, e.g., v0.1.0
      - v*

permissions: { }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Build packages
        run: uv build

      # Check that basic features work and we didn't miss to include crucial files
      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py
      - name: Smoke test (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pypi-dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [ build ]
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pypi-dist
          path: dist/

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Generate PEP 740 Attestations
        uses: astral-sh/attest-action@843fdb67460680643852b73a167aa698fcccf43d

      - name: Publish to PyPI
        run: uv publish

  publish-github:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs: [ build ]
    environment:
      name: github-releases
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Download clean build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pypi-dist
          path: dist/

      - name: Generate artifact attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: "dist/*"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_PRERELEASE: ${{
            contains(github.ref_name, 'rc') ||
            contains(github.ref_name, 'beta') ||
            contains(github.ref_name, 'alpha') ||
            contains(github.ref_name, 'dev') ||
            contains(github.ref_name, 'test') }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          ARGS=("--draft")
          if [ "${IS_PRERELEASE}" = "true" ]; then
            ARGS+=("--prerelease")
          fi

          export LC_ALL=C
          mapfile -t FILES < <(printf "%s\n" dist/* | sort -r)

          git tag -l --format='%(contents:body)' "${GITHUB_REF_NAME}" > release_notes.md
          echo -e "## GitHub generated notes" >> release_notes.md

          gh release create "${GITHUB_REF_NAME}" "${FILES[@]}" \
            --title "Release ${GITHUB_REF_NAME}" \
            --notes-file release_notes.md \
            --generate-notes \
            "${ARGS[@]}"